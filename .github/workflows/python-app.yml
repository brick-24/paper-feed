name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
        exclude:
          # Python 3.13 not yet available on macOS runners
          - os: macos-latest
            python-version: "3.13"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest mypy

      - name: Lint with Ruff
        run: |
          ruff check . --select=E9,F63,F7,F82 --show-source --statistics
          ruff check . --exit-zero --max-line-length=127 --statistics

      - name: Type check with mypy
        run: |
          mypy --ignore-missing-imports --strict-optional .

      - name: Run tests
        run: |
          python -m pytest -v --tb=short || echo "No tests found or test failures (non-blocking)"

      - name: Syntax check
        run: |
          python -m py_compile daily_arg.py config.py printer.py function/*.py